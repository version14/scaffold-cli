name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
            filename: dot-linux-amd64
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
            filename: dot-linux-arm64
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
            filename: dot-darwin-amd64
          - os: macos-latest
            GOOS: darwin
            GOARCH: arm64
            filename: dot-darwin-arm64
          - os: windows-latest
            GOOS: windows
            GOARCH: amd64
            filename: dot-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: go build -v -o ${{ matrix.filename }} ./cmd/dot
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}
          path: ${{ matrix.filename }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p binaries
          find artifacts -type f -exec mv {} binaries/ \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
